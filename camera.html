<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>External Camera Capture</title>
  <style>
    body{font-family:Arial,system-ui,sans-serif;background:#f7f7f7;color:#111;margin:0;padding:24px;}
    h1{font-size:22px;margin-bottom:14px;}
    .panel{max-width:720px;margin:0 auto;background:#fff;padding:20px;border-radius:14px;box-shadow:0 18px 40px rgba(0,0,0,.08);}
    video{width:100%;border-radius:14px;background:#000;}
    .controls{margin-top:16px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;}
    button{padding:12px 18px;font-size:15px;border:none;border-radius:10px;background:#0f1f3d;color:#fff;cursor:pointer;}
    button:disabled{opacity:.55;cursor:not-allowed;}
    .status{margin-top:14px;font-size:14px;color:#555;}
  </style>
</head>
<body>
  <div class="panel">
    <h1>Live Camera Capture</h1>
    <video id="video" autoplay playsinline muted></video>
    <div class="controls">
      <button id="capture">Capture Photo</button>
      <button id="close" type="button">Close</button>
    </div>
    <div class="status" id="status">Requesting camera permission...</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const target = params.get('target') || 'member';
    const status = document.getElementById('status');
    const video = document.getElementById('video');
    const captureButton = document.getElementById('capture');
    const closeButton = document.getElementById('close');

    function showStatus(message){ status.textContent = message; }

    async function startCamera(){
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        video.srcObject = stream;
        showStatus('Camera is ready. Click Capture when you are ready.');
      } catch (error) {
        showStatus('Camera access failed: ' + (error.message || error));
      }
    }

    captureButton.addEventListener('click', ()=>{
      if(!video.videoWidth || !video.videoHeight){ showStatus('Camera not ready yet.'); return; }
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      if(window.opener && !window.opener.closed){
        window.opener.postMessage({ type: 'CAMERA_DATA', target, data: dataUrl }, '*');
        showStatus('Photo captured and sent back. You can now close this window.');
        setTimeout(()=>window.close(), 600);
      } else {
        showStatus('Unable to return photo. Parent window is not available.');
      }
    });

    closeButton.addEventListener('click', ()=>{ window.close(); });
    startCamera();
  </script>
</body>
</html>
